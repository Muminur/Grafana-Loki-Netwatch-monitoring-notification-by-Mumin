version: "3.8"
services:
  netwatch:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - netwatch-data:/app/data
    restart: unless-stopped
    # Top-level limits honoured by docker-compose v1 and docker compose v2
    mem_limit: 512m
    cpus: 1.0
    mem_reservation: 128m
    security_opt:
      - no-new-privileges:true
    # deploy.resources honoured by docker compose v2 (Compose Spec) and Swarm
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx, sys; r = httpx.get('http://localhost:8080/health', timeout=8); sys.exit(0 if r.status_code < 400 else 1)",
        ]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  netwatch-data:
    driver: local
