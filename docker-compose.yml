version: "3.8"
services:
  netwatch:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - netwatch-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import httpx; r = httpx.get('http://localhost:8080/health'); r.raise_for_status()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s

volumes:
  netwatch-data:
