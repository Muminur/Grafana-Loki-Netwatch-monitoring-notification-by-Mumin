name: CI

on:
  push:
    branches: [main, "milestone*/**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref/PR so stale runs don't waste minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # Native pip cache — keyed on requirements files automatically.
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type check (mypy)
        run: mypy src/

      - name: Test + Coverage
        run: |
          coverage run -m pytest -vv
          coverage report --fail-under=85

      - name: Security gate
        if: runner.os != 'Windows'
        run: |
          ! grep -rn --include=*.py "shell=True" src/ || { echo "BANNED: shell=True"; exit 1; }
          ! grep -rn --include=*.py "os\.system(" src/ || { echo "BANNED: os.system"; exit 1; }
          ! grep -rn --include=*.py "^[^#]*\bexcept:" src/ | grep -v "except [A-Z]" || { echo "BANNED: bare except"; exit 1; }
          ! grep -rn --include=*.py "\beval(" src/ || { echo "BANNED: eval()"; exit 1; }
          ! grep -rn --include=*.py "\bexec(" src/ || { echo "BANNED: exec()"; exit 1; }
