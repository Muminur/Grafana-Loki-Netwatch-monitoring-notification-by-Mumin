name: CI

on:
  push:
    branches: [main, "milestone*/**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref/PR so stale runs don't waste minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # Native pip cache — keyed on requirements files automatically.
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Dependency vulnerability scan (pip-audit)
        run: pip-audit -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Type check (mypy)
        run: mypy src/

      - name: Test + Coverage
        run: |
          coverage run -m pytest -vv
          coverage report --fail-under=85

      - name: Security gate
        shell: python
        run: |
          import sys
          import re
          from pathlib import Path

          BANNED = [
              (r"shell\s*=\s*True",  "shell=True"),
              (r"os\.system\(",       "os.system("),
              (r"^\s*except\s*:",     "bare except:"),
              (r"\beval\(",           "eval("),
              (r"\bexec\(",           "exec("),
          ]

          violations = []
          for path in Path("src").rglob("*.py"):
              for lineno, line in enumerate(path.read_text(encoding="utf-8").splitlines(), 1):
                  stripped = line.strip()
                  # Skip comment-only lines for all checks
                  if stripped.startswith("#"):
                      continue
                  # Remove inline comments for pattern matching
                  code_part = re.sub(r"#.*$", "", line)
                  for pattern, label in BANNED:
                      if re.search(pattern, code_part):
                          violations.append(f"BANNED [{label}]  {path}:{lineno}: {line.rstrip()}")

          if violations:
              print("Security gate FAILED -- banned patterns detected:", flush=True)
              for v in violations:
                  print(v, flush=True)
              sys.exit(1)
          else:
              print("Security gate passed.", flush=True)
