<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" fill="none">
  <defs>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0040;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff0040;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9500;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff9500;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="g">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#555570"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#00f0ff"/>
    </marker>
  </defs>

  <rect width="900" height="620" rx="12" fill="#080812"/>
  <text x="450" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#e8e8f0" letter-spacing="3">SYSTEM ARCHITECTURE</text>

  <!-- Network Devices -->
  <rect x="30" y="55" width="840" height="75" rx="8" fill="url(#cyanGrad)" stroke="#00f0ff" stroke-width="1" opacity="0.8"/>
  <text x="450" y="78" text-anchor="middle" font-family="monospace" font-size="12" fill="#00f0ff" letter-spacing="2">BSCCL NETWORK — 34 DEVICES / 5 SITES</text>
  <g font-family="monospace" font-size="10" fill="#8888a0">
    <text x="70" y="100">Dhaka (7)</text>
    <text x="200" y="100">Cox's Bazar (7)</text>
    <text x="370" y="100">Kuakata (3)</text>
    <text x="510" y="100">Singapore (2)</text>
    <text x="660" y="100">Switches (15+)</text>
  </g>

  <!-- Arrow: Devices → Loki -->
  <line x1="450" y1="130" x2="450" y2="155" stroke="#555570" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="470" y="147" font-family="monospace" font-size="9" fill="#555570">UDP 514</text>

  <!-- Loki -->
  <rect x="320" y="158" width="260" height="50" rx="8" fill="url(#purpleGrad)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="450" y="180" text-anchor="middle" font-family="monospace" font-size="13" fill="#8b5cf6" font-weight="600">Grafana Loki</text>
  <text x="450" y="198" text-anchor="middle" font-family="monospace" font-size="9" fill="#555570">:3100 (WebSocket + HTTP)</text>

  <!-- Arrow: Loki → NetWatch -->
  <line x1="450" y1="208" x2="450" y2="238" stroke="#00f0ff" stroke-width="1.5" marker-end="url(#arrowCyan)"/>
  <text x="470" y="228" font-family="monospace" font-size="9" fill="#00f0ff">Loki API</text>

  <!-- NetWatch Main Box -->
  <rect x="30" y="240" width="840" height="330" rx="10" fill="none" stroke="#00f0ff" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <text x="450" y="265" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#00f0ff" letter-spacing="2">BSCCL NETWATCH</text>

  <!-- Row 1: Receiver → Parser → Classifier -->
  <rect x="55" y="280" width="140" height="55" rx="6" fill="url(#cyanGrad)" stroke="#00f0ff" stroke-width="1"/>
  <text x="125" y="305" text-anchor="middle" font-family="monospace" font-size="11" fill="#00f0ff">Syslog</text>
  <text x="125" y="322" text-anchor="middle" font-family="monospace" font-size="11" fill="#00f0ff">Receiver</text>

  <line x1="195" y1="307" x2="225" y2="307" stroke="#555570" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="228" y="280" width="140" height="55" rx="6" fill="url(#cyanGrad)" stroke="#00f0ff" stroke-width="1"/>
  <text x="298" y="305" text-anchor="middle" font-family="monospace" font-size="11" fill="#00f0ff">Parser</text>
  <text x="298" y="322" text-anchor="middle" font-family="monospace" font-size="9" fill="#555570">4 IOS-XR formats</text>

  <line x1="368" y1="307" x2="398" y2="307" stroke="#555570" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="401" y="280" width="140" height="55" rx="6" fill="url(#redGrad)" stroke="#ff0040" stroke-width="1"/>
  <text x="471" y="305" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff0040">Classifier</text>
  <text x="471" y="322" text-anchor="middle" font-family="monospace" font-size="9" fill="#555570">25 rules</text>

  <line x1="541" y1="307" x2="571" y2="307" stroke="#555570" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="574" y="280" width="140" height="55" rx="6" fill="url(#greenGrad)" stroke="#00ff88" stroke-width="1"/>
  <text x="644" y="305" text-anchor="middle" font-family="monospace" font-size="11" fill="#00ff88">Enricher</text>
  <text x="644" y="322" text-anchor="middle" font-family="monospace" font-size="9" fill="#555570">845 interfaces</text>

  <!-- Row 2: Correlator + Dedup -->
  <rect x="55" y="360" width="170" height="55" rx="6" fill="url(#purpleGrad)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="140" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b5cf6">Correlator</text>
  <text x="140" y="402" text-anchor="middle" font-family="monospace" font-size="9" fill="#555570">Incident grouping</text>

  <rect x="255" y="360" width="170" height="55" rx="6" fill="url(#amberGrad)" stroke="#ff9500" stroke-width="1"/>
  <text x="340" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff9500">Dedup Engine</text>
  <text x="340" y="402" text-anchor="middle" font-family="monospace" font-size="9" fill="#555570">5m / 2m / 30s</text>

  <!-- Row 2: DB + Notifications + WebSocket -->
  <rect x="455" y="360" width="130" height="55" rx="6" fill="url(#cyanGrad)" stroke="#00f0ff" stroke-width="1"/>
  <text x="520" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#00f0ff">SQLite DB</text>
  <text x="520" y="402" text-anchor="middle" font-family="monospace" font-size="9" fill="#555570">WAL mode</text>

  <rect x="605" y="360" width="130" height="55" rx="6" fill="url(#redGrad)" stroke="#ff0040" stroke-width="1"/>
  <text x="670" y="385" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff0040">Notifications</text>
  <text x="670" y="402" text-anchor="middle" font-family="monospace" font-size="9" fill="#555570">Discord + Telegram</text>

  <!-- Row 3: FastAPI + Dashboard -->
  <rect x="55" y="440" width="580" height="55" rx="6" fill="url(#greenGrad)" stroke="#00ff88" stroke-width="1"/>
  <text x="345" y="462" text-anchor="middle" font-family="monospace" font-size="13" fill="#00ff88" font-weight="600">FastAPI Web Server (:8080)</text>
  <text x="345" y="482" text-anchor="middle" font-family="monospace" font-size="9" fill="#555570">Neon Dashboard | 6 Tabs | Charts | Topology | Sounds | REST API | WebSocket Push</text>

  <rect x="655" y="440" width="200" height="55" rx="6" fill="url(#amberGrad)" stroke="#ff9500" stroke-width="1"/>
  <text x="755" y="462" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff9500">Statistics</text>
  <text x="755" y="482" text-anchor="middle" font-family="monospace" font-size="9" fill="#555570">Health | SLA | Predictions</text>

  <!-- Row 4: Docker -->
  <rect x="55" y="520" width="800" height="40" rx="6" fill="url(#purpleGrad)" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="450" y="545" text-anchor="middle" font-family="monospace" font-size="11" fill="#8b5cf6">Docker Container | python:3.11-slim | Non-root | Health Check</text>

  <!-- Connecting arrows between rows -->
  <line x1="125" y1="335" x2="125" y2="360" stroke="#555570" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="298" y1="335" x2="340" y2="360" stroke="#555570" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="644" y1="335" x2="670" y2="360" stroke="#555570" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="520" y1="415" x2="345" y2="440" stroke="#555570" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="670" y1="415" x2="670" y2="438" stroke="#555570" stroke-width="1"/>
</svg>
