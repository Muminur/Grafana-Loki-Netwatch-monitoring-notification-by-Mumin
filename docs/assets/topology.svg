<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" fill="none">
  <defs>
    <filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="nodeGreen"><stop offset="0%" stop-color="#00ff88" stop-opacity="0.3"/><stop offset="100%" stop-color="#00ff88" stop-opacity="0.05"/></radialGradient>
    <radialGradient id="nodeRed"><stop offset="0%" stop-color="#ff0040" stop-opacity="0.3"/><stop offset="100%" stop-color="#ff0040" stop-opacity="0.05"/></radialGradient>
    <radialGradient id="nodeAmber"><stop offset="0%" stop-color="#ff9500" stop-opacity="0.3"/><stop offset="100%" stop-color="#ff9500" stop-opacity="0.05"/></radialGradient>
  </defs>

  <rect width="700" height="400" rx="12" fill="#080812"/>
  <text x="350" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#e8e8f0" letter-spacing="3">NETWORK TOPOLOGY — LIVE STATUS</text>

  <!-- Links -->
  <line x1="350" y1="80" x2="200" y2="170" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
  <line x1="350" y1="80" x2="500" y2="170" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
  <line x1="350" y1="80" x2="580" y2="170" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="170" x2="200" y2="260" stroke="#ff9500" stroke-width="2" opacity="0.6" stroke-dasharray="6,3"/>
  <line x1="200" y1="170" x2="350" y2="260" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
  <line x1="500" y1="170" x2="350" y2="260" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
  <line x1="500" y1="170" x2="500" y2="260" stroke="#00ff88" stroke-width="2" opacity="0.6"/>
  <line x1="350" y1="260" x2="350" y2="340" stroke="#00ff88" stroke-width="2" opacity="0.6"/>

  <!-- EQ-RTR-01 (Singapore) -->
  <circle cx="350" cy="75" r="28" fill="url(#nodeGreen)" stroke="#00ff88" stroke-width="2" filter="url(#g)"/>
  <circle cx="350" cy="75" r="6" fill="#00ff88">
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="350" y="55" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff88" font-weight="600">EQ-RTR-01</text>
  <text x="350" y="110" text-anchor="middle" font-family="monospace" font-size="8" fill="#555570">Singapore Equinix</text>

  <!-- KKT-Core-01 -->
  <circle cx="200" cy="170" r="24" fill="url(#nodeGreen)" stroke="#00ff88" stroke-width="2" filter="url(#g)"/>
  <circle cx="200" cy="170" r="5" fill="#00ff88"/>
  <text x="200" y="150" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff88">KKT-01</text>
  <text x="130" y="200" text-anchor="middle" font-family="monospace" font-size="8" fill="#555570">Kuakata CLS</text>

  <!-- KKT-Core-02 -->
  <circle cx="200" cy="260" r="20" fill="url(#nodeAmber)" stroke="#ff9500" stroke-width="2" filter="url(#g)"/>
  <circle cx="200" cy="260" r="5" fill="#ff9500">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="245" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff9500">KKT-02</text>
  <text x="135" y="285" text-anchor="middle" font-family="monospace" font-size="7" fill="#ff9500">DEGRADED</text>

  <!-- COX-Core-03 -->
  <circle cx="500" cy="170" r="24" fill="url(#nodeGreen)" stroke="#00ff88" stroke-width="2" filter="url(#g)"/>
  <circle cx="500" cy="170" r="5" fill="#00ff88"/>
  <text x="500" y="150" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff88">COX-03</text>
  <text x="500" y="200" text-anchor="middle" font-family="monospace" font-size="8" fill="#555570">Cox's Bazar</text>

  <!-- EQ-RTR-02 -->
  <circle cx="580" cy="170" r="20" fill="url(#nodeGreen)" stroke="#00ff88" stroke-width="1.5" filter="url(#g)"/>
  <circle cx="580" cy="170" r="4" fill="#00ff88"/>
  <text x="580" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#00ff88">EQ-02</text>

  <!-- COX-Core-01 -->
  <circle cx="500" cy="260" r="20" fill="url(#nodeGreen)" stroke="#00ff88" stroke-width="1.5" filter="url(#g)"/>
  <circle cx="500" cy="260" r="4" fill="#00ff88"/>
  <text x="500" y="248" text-anchor="middle" font-family="monospace" font-size="9" fill="#00ff88">COX-01</text>

  <!-- DHK-Core-03 -->
  <circle cx="350" cy="260" r="24" fill="url(#nodeGreen)" stroke="#00ff88" stroke-width="2" filter="url(#g)"/>
  <circle cx="350" cy="260" r="5" fill="#00ff88"/>
  <text x="350" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#00ff88">DHK-03</text>
  <text x="350" y="290" text-anchor="middle" font-family="monospace" font-size="8" fill="#555570">Dhaka Tejgaon</text>

  <!-- Clients -->
  <rect x="290" y="330" width="120" height="30" rx="4" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="350" y="350" text-anchor="middle" font-family="monospace" font-size="9" fill="#8b5cf6">22 ISP Clients</text>

  <!-- Legend -->
  <g transform="translate(560, 300)">
    <text x="0" y="0" font-family="monospace" font-size="9" fill="#555570">Legend:</text>
    <circle cx="8" cy="15" r="4" fill="#00ff88"/><text x="18" y="19" font-family="monospace" font-size="8" fill="#8888a0">Healthy</text>
    <circle cx="8" cy="30" r="4" fill="#ff9500"/><text x="18" y="34" font-family="monospace" font-size="8" fill="#8888a0">Degraded</text>
    <circle cx="8" cy="45" r="4" fill="#ff0040"/><text x="18" y="49" font-family="monospace" font-size="8" fill="#8888a0">Down</text>
  </g>

  <!-- Bundle labels on links -->
  <text x="260" y="125" font-family="monospace" font-size="7" fill="#555570" transform="rotate(-35,260,125)">BE500 (9 links)</text>
  <text x="430" y="125" font-family="monospace" font-size="7" fill="#555570" transform="rotate(35,430,125)">BE200</text>
  <text x="280" y="220" font-family="monospace" font-size="7" fill="#555570" transform="rotate(45,280,220)">BE400 (11 links)</text>
</svg>
